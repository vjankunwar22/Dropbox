openapi: 3.0.0
info:
  title: DropBox
  version: 1.0.0
  description: API documentation for the Blog App
servers:
  - url: http://localhost:3000
    description: Local server
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    User:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        role:
          type: string
          enum: [ADMIN, USER]
        profileImage:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
paths:
  /auth/register:
    post:
      summary: Register a new user
      tags: [Auth]
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                name:
                  type: string
                email:
                  type: string
                password:
                  type: string
                role:
                  type: string
                  enum: [ADMIN, BLOGGER]

      responses:
        "201":
          description: User registered successfully
        "400":
          description: Email and password are required
        "409":
          description: User already exists
  /auth/login:
    post:
      summary: Login a user
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                password:
                  type: string
      responses:
        "200":
          description: Successful login
        "400":
          description: Invalid credentials

  /auth/all:
    get:
      summary: Get all users (admin only)
      tags: [Auth]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: List of users
        "401":
          description: Unauthorized
