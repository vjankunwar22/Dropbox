version: "3"
services:
  minio:
    image: minio/minio
    container_name: minio
    environment:
      - MINIO_ROOT_USER=abcd
      - MINIO_ROOT_PASSWORD=abcd2345
      - MINIO_DEFAULT_BUCKETS=buck1
    command: server /export --console-address ":9090" # Alias for localhost access
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
      - "9090:9090"
volumes:
  minio_data:
    driver: local
